<svg width="240" height="50" viewBox="0 0 240 50" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="horizGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0046FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="horizGradientLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#336FFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
    <filter id="horizGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Icon -->
  <g transform="translate(0, 8)">
    <!-- Main Briefcase Shape -->
    <path d="M6 10C6 8.34315 7.34315 7 9 7H15C16.6569 7 18 8.34315 18 10V16C18 17.6569 16.6569 19 15 19H9C7.34315 19 6 17.6569 6 16V10Z" fill="url(#horizGradient)" filter="url(#horizGlow)"/>
    
    <!-- Briefcase Handle -->
    <path d="M10 7V5.5C10 4.67157 10.6716 4 11.5 4H12.5C13.3284 4 14 4.67157 14 5.5V7" stroke="url(#horizGradient)" stroke-width="1.2" stroke-linecap="round" fill="none"/>
    
    <!-- AI Sparkle Elements -->
    <circle cx="10" cy="13" r="1.2" fill="#FFFFFF" opacity="0.9"/>
    <circle cx="14" cy="13" r="1.2" fill="#FFFFFF" opacity="0.9"/>
    <circle cx="12" cy="15.5" r="0.8" fill="#FFFFFF" opacity="0.7"/>
    
    <!-- Connection Lines -->
    <path d="M12 10L12 7" stroke="url(#horizGradientLight)" stroke-width="0.8" stroke-linecap="round" opacity="0.6"/>
    <path d="M9 13L6 13" stroke="url(#horizGradientLight)" stroke-width="0.8" stroke-linecap="round" opacity="0.4"/>
    <path d="M15 13L18 13" stroke="url(#horizGradientLight)" stroke-width="0.8" stroke-linecap="round" opacity="0.4"/>
    
    <!-- Upward Arrow -->
    <path d="M12 16L12 19M12 19L9.5 17M12 19L14.5 17" stroke="url(#horizGradient)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Text -->
  <text x="28" y="32" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="28" font-weight="700" fill="#0046FF" letter-spacing="-0.5">
    Workflow
  </text>
  <text x="28" y="45" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="600" fill="#7C3AED" letter-spacing="1.5" opacity="0.85">
    AI
  </text>
</svg>










